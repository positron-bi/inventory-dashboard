<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ورود | داشبورد موجودی</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,"Segoe UI",Arial,sans-serif;min-height:100vh;display:flex;
  align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(135deg,#0f172a,#1e293b);color:#e2e8f0}
.box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px 32px;
  width:min(92vw,380px);box-shadow:0 20px 60px rgba(0,0,0,.45);text-align:center}
.logo{font-size:44px;margin-bottom:10px}
h1{font-size:20px;font-weight:700;margin-bottom:6px}
p.sub{font-size:13px;color:#94a3b8;margin-bottom:24px}
input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid #475569;
  background:#0f172a;color:#e2e8f0;font-size:16px;text-align:center;outline:none;transition:.2s}
input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
button{width:100%;margin-top:16px;padding:13px;border:0;border-radius:10px;background:#3b82f6;
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:.2s}
button:hover{background:#2563eb}
button:disabled{opacity:.6;cursor:wait}
.err{color:#f87171;font-size:13px;margin-top:14px;min-height:18px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🔒</div>
  <h1>داشبورد موجودی انبار</h1>
  <p class="sub">برای مشاهده، رمز عبور را وارد کنید</p>
  <form id="f">
    <input id="pw" type="password" placeholder="رمز عبور" autocomplete="current-password" autofocus>
    <button id="btn" type="submit">ورود</button>
    <div class="err" id="err"></div>
  </form>
</div>

  for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}

    btn.disabled=false;btn.textContent='ورود';pw.value='';pw.focus();
