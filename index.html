      {name:'PBKDF2',salt:b64d(SALT),iterations:ITER,hash:'SHA-256'},
      baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
    var buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(IV)},key,b64d(CT));
    var html=new TextDecoder().decode(buf);
    document.open();document.write(html);document.close();
  }catch(ex){
    err.textContent='رمز عبور نادرست است.';
    btn.disabled=false;btn.textContent='ورود';pw.value='';pw.focus();
  }
});
</script>
