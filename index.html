function b64d(s){var bin=atob(s),u=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
var f=document.getElementById('f'),pw=document.getElementById('pw'),

f.addEventListener('submit',async function(e){
  e.preventDefault();err.textContent='';btn.disabled=true;btn.textContent='در حال بازگشایی...';

    var enc=new TextEncoder();
    var baseKey=await crypto.subtle.importKey('raw',enc.encode(pw.value),'PBKDF2',false,['deriveKey']);

    document.open();document.write(html);document.close();

    err.textContent='رمز عبور نادرست است.';
    btn.disabled=false;btn.textContent='ورود';pw.value='';pw.focus();
  }
});
